<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Rock Paper Scissors</title>
</head>
<body>
  <div class="content">
    <h2>Rock Paper Scissors</h2>

    <div class="settings-panel">
      <div class="difficulty-selector">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty" class="difficulty-select">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      
      <div class="timer-toggle">
        <label for="timerToggle">Timer Challenge:</label>
        <input type="checkbox" id="timerToggle" class="timer-checkbox">
      </div>

      <button class="score-reset" onclick="
      score.wins = 0;
      score.loses = 0;
      score.ties = 0;
      score.streak = 0;
      localStorage.setItem('score', JSON.stringify(score));
      updateStreakDisplay();
    ">Reset Score</button>
    </div>
  </div>

  <div class="streak-display" id="streakDisplay">
    <span class="streak-label">Win Streak:</span>
    <span class="streak-count" id="streakCount">0</span>
    <span class="streak-multiplier" id="streakMultiplier"></span>
  </div>

  <div class="timer-display" id="timerDisplay" style="display: none;">
    <span class="timer-label">Time:</span>
    <span class="timer-count" id="timerCount">3</span>
  </div>

  <div class="arena" id="arena">
    <div class="arena-slot player-slot">
      <span class="arena-icon" id="playerIcon">?</span>
      <span class="arena-label">You</span>
    </div>
    <div class="arena-vs">VS</div>
    <div class="arena-slot computer-slot">
      <span class="arena-icon" id="computerIcon">?</span>
      <span class="arena-label">Computer</span>
    </div>
  </div>

  <div class="playgame">
    <button class="move-button" onclick="
    playGame('👊');
  ">👊</button>


    <button class="move-button" onclick="
    playGame('✋');
  ">✋</button>


    <button class="move-button" onclick="
    playGame('✌️');
  ">✌️</button>

  </div>

  <div class="modal-overlay" id="resultModal">
    <div class="modal-card">
      <h3 class="modal-title">Round Result</h3>
      <p class="modal-text" id="modalText"></p>
      <button class="modal-close" id="modalCloseBtn" onclick="closeModal()">Play Again</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
